openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: SJM Social Media Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User management
  - name: posts
    description: Posts and feed
  - name: stories
    description: Stories
  - name: reels
    description: Reels
  - name: messages
    description: Messaging
  - name: notifications
    description: Notifications
  - name: groups
    description: Groups
  - name: marketplace
    description: Marketplace
  - name: search
    description: Search
  - name: admin
    description: Admin panel

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: OK

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  # USERS
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users (suggestions / friends)
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: Not found

    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}/follow:
    post:
      operationId: followUser
      tags: [users]
      summary: Follow a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK

  /users/{id}/unfollow:
    post:
      operationId: unfollowUser
      tags: [users]
      summary: Unfollow a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK

  /users/{id}/followers:
    get:
      operationId: getUserFollowers
      tags: [users]
      summary: Get followers
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/{id}/following:
    get:
      operationId: getUserFollowing
      tags: [users]
      summary: Get following
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  # POSTS
  /posts:
    get:
      operationId: listPosts
      tags: [posts]
      summary: Get feed posts
      parameters:
        - name: userId
          in: query
          schema:
            type: ["integer", "null"]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"

    post:
      operationId: createPost
      tags: [posts]
      summary: Create a post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /posts/{id}:
    get:
      operationId: getPost
      tags: [posts]
      summary: Get a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "404":
          description: Not found

    delete:
      operationId: deletePost
      tags: [posts]
      summary: Delete a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /posts/{id}/like:
    post:
      operationId: likePost
      tags: [posts]
      summary: Like/react to a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReactionInput"
      responses:
        "200":
          description: OK

  /posts/{id}/comments:
    get:
      operationId: listComments
      tags: [posts]
      summary: Get comments for a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"

    post:
      operationId: createComment
      tags: [posts]
      summary: Add comment to a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

  /posts/trending:
    get:
      operationId: getTrendingPosts
      tags: [posts]
      summary: Get trending posts
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"

  # STORIES
  /stories:
    get:
      operationId: listStories
      tags: [stories]
      summary: Get active stories
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Story"

    post:
      operationId: createStory
      tags: [stories]
      summary: Create a story
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Story"

  /stories/{id}/view:
    post:
      operationId: viewStory
      tags: [stories]
      summary: Mark story as viewed
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK

  # REELS
  /reels:
    get:
      operationId: listReels
      tags: [reels]
      summary: Get reels feed
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reel"

    post:
      operationId: createReel
      tags: [reels]
      summary: Create a reel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReelInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reel"

  /reels/{id}/like:
    post:
      operationId: likeReel
      tags: [reels]
      summary: Like a reel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK

  # MESSAGES
  /conversations:
    get:
      operationId: listConversations
      tags: [messages]
      summary: List conversations
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"

    post:
      operationId: createConversation
      tags: [messages]
      summary: Start a conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /conversations/{id}/messages:
    get:
      operationId: listMessages
      tags: [messages]
      summary: Get messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"

    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  # NOTIFICATIONS
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: Get notifications
      parameters:
        - name: unreadOnly
          in: query
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: OK

  /notifications/{id}/read:
    post:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK

  # GROUPS
  /groups:
    get:
      operationId: listGroups
      tags: [groups]
      summary: List groups
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Group"

    post:
      operationId: createGroup
      tags: [groups]
      summary: Create a group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"

  /groups/{id}:
    get:
      operationId: getGroup
      tags: [groups]
      summary: Get group details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"

  /groups/{id}/join:
    post:
      operationId: joinGroup
      tags: [groups]
      summary: Join a group
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK

  # MARKETPLACE
  /marketplace/products:
    get:
      operationId: listProducts
      tags: [marketplace]
      summary: List marketplace products
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

    post:
      operationId: createProduct
      tags: [marketplace]
      summary: List a product for sale
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /marketplace/products/{id}:
    get:
      operationId: getProduct
      tags: [marketplace]
      summary: Get product details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found

  # SEARCH
  /search:
    get:
      operationId: globalSearch
      tags: [search]
      summary: Global search
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [all, users, posts, groups, reels, products]
            default: all
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"

  # STATS / WOW
  /stats/feed-summary:
    get:
      operationId: getFeedSummary
      tags: [posts]
      summary: Get feed summary counts
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedSummary"

  /stats/platform:
    get:
      operationId: getPlatformStats
      tags: [admin]
      summary: Get platform-level statistics
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

  # ADMIN
  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: Admin list all users
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [active, banned, all]
            default: all
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"

  /admin/users/{id}/ban:
    post:
      operationId: banUser
      tags: [admin]
      summary: Ban a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BanInput"
      responses:
        "200":
          description: OK

  /admin/reports:
    get:
      operationId: listReports
      tags: [admin]
      summary: List user reports
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Report"

  /admin/posts/{id}:
    delete:
      operationId: adminDeletePost
      tags: [admin]
      summary: Admin delete a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # AUTH
    RegisterInput:
      type: object
      required: [fullName, username, email, password]
      properties:
        fullName:
          type: string
        username:
          type: string
        email:
          type: string
        password:
          type: string
        phone:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        gender:
          type: ["string", "null"]
        dateOfBirth:
          type: ["string", "null"]

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    # USER
    User:
      type: object
      required: [id, fullName, username, email, createdAt]
      properties:
        id:
          type: integer
        fullName:
          type: string
        username:
          type: string
        email:
          type: string
        avatarUrl:
          type: ["string", "null"]
        coverUrl:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        isVerified:
          type: boolean
        isAdmin:
          type: boolean
        isBanned:
          type: boolean
        followersCount:
          type: integer
        followingCount:
          type: integer
        postsCount:
          type: integer
        createdAt:
          type: string

    UserProfile:
      type: object
      required: [id, fullName, username, email, createdAt]
      properties:
        id:
          type: integer
        fullName:
          type: string
        username:
          type: string
        email:
          type: string
        avatarUrl:
          type: ["string", "null"]
        coverUrl:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        isVerified:
          type: boolean
        isAdmin:
          type: boolean
        isBanned:
          type: boolean
        followersCount:
          type: integer
        followingCount:
          type: integer
        postsCount:
          type: integer
        isFollowing:
          type: boolean
        createdAt:
          type: string

    UserUpdate:
      type: object
      properties:
        fullName:
          type: string
        bio:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        coverUrl:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]

    AdminUser:
      type: object
      required: [id, fullName, username, email, createdAt, isBanned, postsCount]
      properties:
        id:
          type: integer
        fullName:
          type: string
        username:
          type: string
        email:
          type: string
        avatarUrl:
          type: ["string", "null"]
        isVerified:
          type: boolean
        isAdmin:
          type: boolean
        isBanned:
          type: boolean
        postsCount:
          type: integer
        followersCount:
          type: integer
        createdAt:
          type: string
        banReason:
          type: ["string", "null"]

    # POST
    Post:
      type: object
      required: [id, authorId, type, createdAt]
      properties:
        id:
          type: integer
        authorId:
          type: integer
        author:
          $ref: "#/components/schemas/User"
        type:
          type: string
          enum: [text, image, video, poll, reel]
        content:
          type: ["string", "null"]
        mediaUrls:
          type: array
          items:
            type: string
        hashtags:
          type: array
          items:
            type: string
        likesCount:
          type: integer
        commentsCount:
          type: integer
        sharesCount:
          type: integer
        isLiked:
          type: boolean
        userReaction:
          type: ["string", "null"]
        audience:
          type: string
          enum: [public, friends, private]
        createdAt:
          type: string

    PostInput:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [text, image, video, poll]
        content:
          type: ["string", "null"]
        mediaUrls:
          type: array
          items:
            type: string
        hashtags:
          type: array
          items:
            type: string
        audience:
          type: string
          enum: [public, friends, private]

    ReactionInput:
      type: object
      required: [reaction]
      properties:
        reaction:
          type: string
          enum: [like, love, haha, wow, sad, angry]

    Comment:
      type: object
      required: [id, postId, authorId, content, createdAt]
      properties:
        id:
          type: integer
        postId:
          type: integer
        authorId:
          type: integer
        author:
          $ref: "#/components/schemas/User"
        content:
          type: string
        parentId:
          type: ["integer", "null"]
        likesCount:
          type: integer
        createdAt:
          type: string

    CommentInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
        parentId:
          type: ["integer", "null"]

    # STORY
    Story:
      type: object
      required: [id, authorId, type, createdAt, expiresAt]
      properties:
        id:
          type: integer
        authorId:
          type: integer
        author:
          $ref: "#/components/schemas/User"
        type:
          type: string
          enum: [image, video, text]
        mediaUrl:
          type: ["string", "null"]
        textContent:
          type: ["string", "null"]
        backgroundColor:
          type: ["string", "null"]
        viewsCount:
          type: integer
        isViewed:
          type: boolean
        createdAt:
          type: string
        expiresAt:
          type: string

    StoryInput:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [image, video, text]
        mediaUrl:
          type: ["string", "null"]
        textContent:
          type: ["string", "null"]
        backgroundColor:
          type: ["string", "null"]

    # REEL
    Reel:
      type: object
      required: [id, authorId, videoUrl, createdAt]
      properties:
        id:
          type: integer
        authorId:
          type: integer
        author:
          $ref: "#/components/schemas/User"
        videoUrl:
          type: string
        thumbnailUrl:
          type: ["string", "null"]
        caption:
          type: ["string", "null"]
        sound:
          type: ["string", "null"]
        hashtags:
          type: array
          items:
            type: string
        likesCount:
          type: integer
        commentsCount:
          type: integer
        viewsCount:
          type: integer
        isLiked:
          type: boolean
        createdAt:
          type: string

    ReelInput:
      type: object
      required: [videoUrl]
      properties:
        videoUrl:
          type: string
        thumbnailUrl:
          type: ["string", "null"]
        caption:
          type: ["string", "null"]
        sound:
          type: ["string", "null"]
        hashtags:
          type: array
          items:
            type: string

    # MESSAGES
    Conversation:
      type: object
      required: [id, createdAt]
      properties:
        id:
          type: integer
        participants:
          type: array
          items:
            $ref: "#/components/schemas/User"
        isGroup:
          type: boolean
        groupName:
          type: ["string", "null"]
        groupAvatarUrl:
          type: ["string", "null"]
        lastMessage:
          $ref: "#/components/schemas/Message"
        unreadCount:
          type: integer
        createdAt:
          type: string

    ConversationInput:
      type: object
      required: [participantIds]
      properties:
        participantIds:
          type: array
          items:
            type: integer
        isGroup:
          type: boolean
        groupName:
          type: ["string", "null"]

    Message:
      type: object
      required: [id, conversationId, senderId, content, createdAt]
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        senderId:
          type: integer
        sender:
          $ref: "#/components/schemas/User"
        content:
          type: string
        type:
          type: string
          enum: [text, image, video, audio, file, emoji]
        mediaUrl:
          type: ["string", "null"]
        isRead:
          type: boolean
        isDeleted:
          type: boolean
        createdAt:
          type: string

    MessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
        type:
          type: string
          enum: [text, image, video, audio, file, emoji]
        mediaUrl:
          type: ["string", "null"]

    # NOTIFICATIONS
    Notification:
      type: object
      required: [id, userId, type, message, isRead, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        type:
          type: string
          enum: [like, comment, follow, message, mention, group_invite, story_reaction, reel_like]
        message:
          type: string
        actorId:
          type: ["integer", "null"]
        actor:
          $ref: "#/components/schemas/User"
        entityId:
          type: ["integer", "null"]
        entityType:
          type: ["string", "null"]
        isRead:
          type: boolean
        createdAt:
          type: string

    # GROUPS
    Group:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        coverUrl:
          type: ["string", "null"]
        isPrivate:
          type: boolean
        membersCount:
          type: integer
        postsCount:
          type: integer
        isMember:
          type: boolean
        createdAt:
          type: string

    GroupInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        isPrivate:
          type: boolean

    # MARKETPLACE
    Product:
      type: object
      required: [id, sellerId, title, price, createdAt]
      properties:
        id:
          type: integer
        sellerId:
          type: integer
        seller:
          $ref: "#/components/schemas/User"
        title:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        category:
          type: string
        imageUrls:
          type: array
          items:
            type: string
        condition:
          type: string
          enum: [new, like_new, good, fair, poor]
        location:
          type: ["string", "null"]
        isAvailable:
          type: boolean
        viewsCount:
          type: integer
        createdAt:
          type: string

    ProductInput:
      type: object
      required: [title, price, category]
      properties:
        title:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        category:
          type: string
        imageUrls:
          type: array
          items:
            type: string
        condition:
          type: string
          enum: [new, like_new, good, fair, poor]
        location:
          type: ["string", "null"]

    # SEARCH
    SearchResults:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
        posts:
          type: array
          items:
            $ref: "#/components/schemas/Post"
        groups:
          type: array
          items:
            $ref: "#/components/schemas/Group"
        reels:
          type: array
          items:
            $ref: "#/components/schemas/Reel"
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer

    # STATS
    FeedSummary:
      type: object
      required: [totalPosts, totalStories, unreadNotifications, unreadMessages, newFollowers]
      properties:
        totalPosts:
          type: integer
        totalStories:
          type: integer
        unreadNotifications:
          type: integer
        unreadMessages:
          type: integer
        newFollowers:
          type: integer
        trendingHashtags:
          type: array
          items:
            type: string

    PlatformStats:
      type: object
      required: [totalUsers, totalPosts, totalReels, totalGroups, activeToday, bannedUsers]
      properties:
        totalUsers:
          type: integer
        totalPosts:
          type: integer
        totalReels:
          type: integer
        totalGroups:
          type: integer
        totalProducts:
          type: integer
        activeToday:
          type: integer
        bannedUsers:
          type: integer
        reportsPending:
          type: integer

    # ADMIN
    BanInput:
      type: object
      required: [reason]
      properties:
        reason:
          type: string

    Report:
      type: object
      required: [id, reporterId, entityType, entityId, reason, status, createdAt]
      properties:
        id:
          type: integer
        reporterId:
          type: integer
        reporter:
          $ref: "#/components/schemas/User"
        entityType:
          type: string
          enum: [post, user, comment, reel, group, product]
        entityId:
          type: integer
        reason:
          type: string
        status:
          type: string
          enum: [pending, reviewed, dismissed]
        createdAt:
          type: string
